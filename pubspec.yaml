name: newgo
description: "CrowdGo - Crowd Management and Safety App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.4
  firebase_storage: ^12.4.3
  firebase_messaging: ^15.2.4

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.7

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location tracking
  location: ^5.0.0
  geocoding: ^2.1.1

  # Utilities
  collection: ^1.18.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true